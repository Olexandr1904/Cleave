# Global configuration — inherited by every project and repo.
# Copy this directory to `config-live/` and fill in values for your deployment.

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  default_chat_id: "${TELEGRAM_CHAT_ID}"

claude:
  api_key: "${CLAUDE_API_KEY}"

workspaces:
  base_dir: "/data/sickle"         # Where ticket workspaces are created
  max_age_days: 14                 # Workspace TTL before cleanup
  min_free_disk_gb: 5              # Skip new tickets if disk is low
  max_workspace_size_gb: 2

defaults:
  poll_interval_seconds: 300
  max_iterations:
    scope_guard: 3
    fix: 3
    qa: 2
    dev: 2
  max_parallel_tickets: 5
  pr_comment_fetch_delay_minutes: 30
  # Per-agent execution ceiling. Whichever limit hits first ends the run and
  # marks it failed (permanent). Tune these down to lower runaway-quota cost.
  agent_budget:
    max_tool_rounds: 25
    wall_clock_seconds: 1800       # 30 min
    max_total_tokens: 500000       # input + output combined
  # Optional per-agent overrides — use the agent id (as in agents/<id>.md
  # frontmatter). Anything unspecified inherits from `agent_budget` above.
  # agent_budget_overrides:
  #   dev-agent:
  #     max_tool_rounds: 30
  #     wall_clock_seconds: 2400
  #     max_total_tokens: 800000
  #   ba-agent:
  #     max_tool_rounds: 15
  #     wall_clock_seconds: 600
  #     max_total_tokens: 200000

logging:
  level: "INFO"
  dir: "/var/log/sickle"

heartbeat:
  enabled: true
  interval_hours: 24
  send_at: "09:00"

# Operator profile — describes the human running Sickle. Agents use this to
# tailor code style, commit format, and scope rules. Fill in your own.
operator:
  role: "Your role (e.g. Team Lead, Solo Developer)"
  stack:
    - "Your primary language / framework"
    - "Your secondary stack"
  preferences:
    code_style: "Follow existing project conventions exactly"
    commit_format: "feat({ticket_id}): {description}"
  rules:
    - "Never auto-merge PRs — human reviews and merges"
    - "Always include ticket ID in commit messages"
    - "Follow existing test patterns in the repo"
    - "Do not refactor outside ticket scope"
