# Example repo configuration — rename this file to `<repo.id>.yaml` when you
# copy this template.

repo:
  id: "example-repo"
  name: "Example Repository"
  enabled: true

vcs:
  provider: "github"                # or "gitlab"
  github:
    token: "${GITHUB_TOKEN}"
    owner: "your-org"
    repo: "your-repo"
    default_branch: "main"
    branch_prefix: "feature"
    merge_method: "squash"

ci:
  provider: "github_actions"        # or "jenkins"

git:
  clone_url: "https://${GITHUB_TOKEN}@github.com/your-org/your-repo.git"
  commit_author_name: "Sickle Bot"
  commit_author_email: "sickle@pipeline.local"
  depth: 1

architecture:
  # Optional path to an architecture rules file agents must follow.
  rules_file: "docs/arch-rules.md"
  # Files/dirs agents must never modify.
  protected_files:
    - ".github/"
    - "build.gradle.kts"
    - "settings.gradle.kts"

linting:
  run_command: "./gradlew detekt"
  hard_gate: true

testing:
  run_command: "./gradlew test"
  hard_gate: true

build:
  check_command: "./gradlew assembleDebug"
  hard_gate: true

# Optional: paths to your existing helper scripts. Leave empty to skip.
helpers:
  fetch_pr_comments: ""
  resolve_pr_comments: ""
  fetch_ci_failure: ""
  fetch_jira_tickets: ""
  update_jira_status: ""
  code_review: ""
  create_jira_ticket: ""

jira_repo_label: "example-repo"

pr_description_template: |
  ## {ticket_id}

  Automated PR created by Sickle pipeline.

  **Jira:** ${JIRA_URL}/browse/{ticket_id}

  ### Checklist
  - [x] Implementation plan followed
  - [x] Scope guard passed
  - [x] QA gates passed (tests, lint, build)
  - [ ] Code review
  - [ ] Human merge

parallelism:
  max_concurrent_tickets: 2
