telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  default_chat_id: "${TELEGRAM_CHAT_ID}"

claude:
  api_key: "${CLAUDE_API_KEY}"

workspaces:
  base_dir: "/data"
  max_age_days: 7
  min_free_disk_gb: 5
  max_workspace_size_gb: 2

defaults:
  poll_interval_seconds: 300
  max_iterations:
    scope_guard: 3
    fix: 3
    qa: 2
    dev: 2
  max_parallel_tickets: 5
  pr_comment_fetch_delay_minutes: 30

logging:
  level: "INFO"
  dir: "/var/log/cleave"

heartbeat:
  enabled: true
  interval_hours: 24

operator:
  role: "Tech Lead"
  stack:
    - "Python"
    - "Kotlin"
  preferences:
    code_style: "clean"
  rules:
    - "No unused imports"
