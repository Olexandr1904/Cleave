workflow:
  id: "default"
  name: "Standard Ticket Pipeline"
  description: "Full ticket lifecycle: analysis -> dev -> scope -> qa -> push -> pr review -> done"

stages:
  - id: "analysis"
    agent: "ba-agent"
    description: "Validate requirements, create implementation plan"
    next: "dev"
    on_unclear: "escalate"

  - id: "dev"
    agent: "dev-agent"
    description: "Implement code on feature branch"
    next: "scope_check"

  - id: "scope_check"
    agent: "scope-guard-agent"
    description: "Validate diff against plan and arch rules"
    on_pass: "qa"
    on_fail: "dev"
    max_iterations: 2        # consecutive failures only — counter resets on pass (see orchestrator.py)
    on_max_iterations: "escalate"

  - id: "qa"
    agent: "qa-agent"
    description: "Write tests, run quality suite (test/lint/build)"
    on_pass: "push"
    on_fail: "dev"
    max_iterations: 2
    on_max_iterations: "escalate"

  - id: "push"
    action: "push_and_open_pr"
    description: "Push branch and open PR"
    next: "pr_review"

  - id: "pr_review"
    action: "fetch_pr_comments"
    description: "Fetch and analyze PR review comments"
    delay_minutes: 30
    on_fix_required: "dev"
    on_done: "done"
    max_iterations: 3
    on_max_iterations: "escalate"

  - id: "escalate"
    action: "notify_human"
    description: "Send Telegram notification, wait for reply"
    on_reply: "resume_previous"

  - id: "done"
    action: "finalize"
    description: "Notify completion, await human merge"
