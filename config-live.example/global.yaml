# Global configuration — inherited by every project and repo.
# Copy this directory to `config-live/` and fill in values for your deployment.

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  default_chat_id: "${TELEGRAM_CHAT_ID}"

claude:
  api_key: "${CLAUDE_API_KEY}"

workspaces:
  base_dir: "/data/sickle"         # Where ticket workspaces are created
  max_age_days: 14                 # Workspace TTL before cleanup
  min_free_disk_gb: 5              # Skip new tickets if disk is low
  max_workspace_size_gb: 2

defaults:
  poll_interval_seconds: 300
  max_iterations:
    scope_guard: 3
    fix: 3
    qa: 2
    dev: 2
  max_parallel_tickets: 5
  pr_comment_fetch_delay_minutes: 30
  # Per-execution agent ceilings. Whichever limit trips first ends the run
  # and marks it permanent-failed.
  #   - max_tool_rounds: applies only to the in-process tool loop (API
  #     adapter). The Claude Code CLI subprocess handles its own tool loop
  #     and is opaque to this counter, so this number doesn't bound CLI runs.
  #   - wall_clock_seconds: applies to both API and CLI paths. On the CLI
  #     path we kill the subprocess on timeout.
  #   - max_total_tokens: enforced pre-emptively in the API tool loop, and
  #     post-hoc on the CLI path (we can't interrupt the CLI mid-flight).
  #
  # The global default is sized for *real feature* work, not the fix-heavy
  # sample today's logs show. False-positive kills on legit feature runs are
  # worse than letting a runaway burn extra quota — `max_iterations` already
  # bounds re-invocations per stage. So defaults are loose, and per-agent
  # overrides tighten only for naturally bounded agents.
  agent_budget:
    max_tool_rounds: 25
    wall_clock_seconds: 14400      # 4 h — stuck runs in prod logged 9–13 h
    max_total_tokens: 15000000     # 15M; dev/qa fixes peak ~2.5M, features ≫
  # Tighter ceilings for agents whose work is bounded by inputs (diff size,
  # PR comment count) rather than by feature complexity. These are safe to
  # tighten because a bigger feature won't make scope-guard or
  # pr-comment-responder do more work — they'll always finish in <5 min and
  # <500K tokens on real production runs.
  agent_budget_overrides:
    scope-guard-agent:
      wall_clock_seconds: 1200     # 20 min — biggest observed ~5 min
      max_total_tokens: 2000000    # 2M; max observed ~470K
    pr-comment-responder-agent:
      wall_clock_seconds: 900      # 15 min — biggest observed ~3 min
      max_total_tokens: 1500000    # 1.5M; max observed ~380K

logging:
  level: "INFO"
  dir: "/var/log/sickle"

heartbeat:
  enabled: true
  interval_hours: 24
  send_at: "09:00"

# Operator profile — describes the human running Sickle. Agents use this to
# tailor code style, commit format, and scope rules. Fill in your own.
operator:
  role: "Your role (e.g. Team Lead, Solo Developer)"
  stack:
    - "Your primary language / framework"
    - "Your secondary stack"
  preferences:
    code_style: "Follow existing project conventions exactly"
    commit_format: "feat({ticket_id}): {description}"
  rules:
    - "Never auto-merge PRs — human reviews and merges"
    - "Always include ticket ID in commit messages"
    - "Follow existing test patterns in the repo"
    - "Do not refactor outside ticket scope"
